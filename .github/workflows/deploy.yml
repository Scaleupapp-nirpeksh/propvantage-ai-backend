name: Deploy to EC2

# Triggers:
#   - automatic on push to main (after CI tests pass — see test.yml)
#   - manual via Actions UI ("Run workflow")
on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: short-lived federated credential, no long-lived AWS keys in GitHub.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_ID: i-0dfec8426e507aa00
  APP_DIR: /home/ec2-user/propvantage-ai-backend
  PM2_APP: propvantage-api
  HEALTH_URL: https://api.prop-vantage.com/api/health

jobs:
  deploy:
    name: SSM deploy to prop-vantage EC2
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prop-vantage-prod
      cancel-in-progress: false

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy

      - name: Send deploy command via SSM
        id: ssm
        run: |
          set -e

          # Write the deploy script to a file (preserves newlines exactly).
          # SSM Run Command executes as root but with no HOME env var; pm2 stores
          # its app registry under $HOME/.pm2, so we set HOME=/root explicitly to
          # match the existing pm2 daemon's process registry.
          cat > /tmp/deploy.sh <<'BASH'
          set -euo pipefail
          export HOME=/root
          APP_DIR=/home/ec2-user/propvantage-ai-backend
          PM2_APP=propvantage-api
          cd "$APP_DIR"
          BEFORE=$(git rev-parse --short HEAD)
          echo "Before: $BEFORE"
          git fetch origin main
          git pull origin main --ff-only
          AFTER=$(git rev-parse --short HEAD)
          echo "After:  $AFTER"
          # Re-install deps only if package-lock.json actually changed
          if ! git diff --quiet "$BEFORE" "$AFTER" -- package-lock.json; then
            echo "package-lock.json changed; running npm ci..."
            npm ci --omit=dev
          else
            echo "No dependency changes; skipping npm install."
          fi
          # Sync managed secrets into .env (idempotent upsert), then reload env on restart.
          # GitHub substitutes the ${{ secrets.* }} value into this script before it is sent.
          if [ -f .env ]; then grep -v '^ANTHROPIC_API_KEY=' .env > .env.tmp && mv .env.tmp .env; fi
          echo "ANTHROPIC_API_KEY='${{ secrets.ANTHROPIC_API_KEY }}'" >> .env
          pm2 restart "$PM2_APP" --update-env
          pm2 save
          echo "Deployed $AFTER"
          BASH

          # Build the SSM SendCommand request as JSON (avoids shell ↔ shorthand
          # escaping issues that swallow newlines in inline --parameters).
          jq -n \
            --arg instance "$INSTANCE_ID" \
            --arg comment "gh-actions deploy ${{ github.sha }}" \
            --rawfile script /tmp/deploy.sh \
            '{
              InstanceIds: [$instance],
              DocumentName: "AWS-RunShellScript",
              Comment: $comment,
              TimeoutSeconds: 600,
              Parameters: {
                commands: [$script]
              }
            }' > /tmp/send-command.json

          CMD_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/send-command.json \
            --query 'Command.CommandId' --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Started SSM command $CMD_ID"

      - name: Wait for SSM command to finish
        run: |
          set -e
          CMD_ID="${{ steps.ssm.outputs.command_id }}"
          # AWS CLI ships a built-in waiter for command execution
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" || true
          # Always fetch the invocation to surface output and final status
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --output json > /tmp/inv.json
          STATUS=$(jq -r .Status /tmp/inv.json)
          echo "=== SSM stdout ==="
          jq -r .StandardOutputContent /tmp/inv.json
          echo ""
          echo "=== SSM stderr ==="
          jq -r .StandardErrorContent /tmp/inv.json
          echo ""
          echo "Final status: $STATUS"
          [ "$STATUS" = "Success" ] || { echo "::error::Deploy command failed"; exit 1; }

      - name: Verify health endpoint
        run: |
          echo "Waiting 8s for server to settle..."
          sleep 8
          for attempt in 1 2 3 4 5; do
            CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 10 "$HEALTH_URL" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Health check OK (attempt $attempt)"
              jq '.status, .version' /tmp/health.json || cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $attempt: HTTP $CODE — retrying in 5s..."
            sleep 5
          done
          echo "::error::Health check failed after 5 attempts"
          cat /tmp/health.json || true
          exit 1
