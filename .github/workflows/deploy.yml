name: Deploy to EC2

# Triggers:
#   - automatic on push to main
#   - manual via Actions UI ("Run workflow")
on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC requires this. No long-lived AWS keys live in GitHub secrets.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_ID: i-0dfec8426e507aa00
  SSH_USER: ec2-user
  APP_DIR: /home/ec2-user/propvantage-ai-backend
  PM2_APP: propvantage-api
  HEALTH_URL: https://api.prop-vantage.com/api/health

jobs:
  deploy:
    name: Pull + restart on prop-vantage EC2
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prop-vantage-prod
      cancel-in-progress: false

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy

      - name: Resolve EC2 public DNS
        id: ec2
        run: |
          HOST=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicDnsName' \
            --output text)
          if [ -z "$HOST" ] || [ "$HOST" = "None" ]; then
            echo "::error::Could not resolve PublicDnsName for $INSTANCE_ID"
            exit 1
          fi
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "Resolved host: $HOST"

      - name: Generate ephemeral SSH key
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/ci-key -N "" -q
          chmod 600 /tmp/ci-key

      - name: Push public key via EC2 Instance Connect (60s validity)
        run: |
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id "$INSTANCE_ID" \
            --instance-os-user "$SSH_USER" \
            --ssh-public-key file:///tmp/ci-key.pub

      - name: Deploy (git pull + pm2 restart)
        env:
          HOST: ${{ steps.ec2.outputs.host }}
        run: |
          ssh -i /tmp/ci-key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=30 \
              "$SSH_USER@$HOST" 'bash -se' <<'REMOTE'
            set -euo pipefail

            APP_DIR="/home/ec2-user/propvantage-ai-backend"
            PM2_APP="propvantage-api"

            cd "$APP_DIR"
            BEFORE=$(sudo git rev-parse --short HEAD)
            echo "Before: $BEFORE"

            sudo git fetch origin main
            sudo git pull origin main --ff-only

            AFTER=$(sudo git rev-parse --short HEAD)
            echo "After:  $AFTER"

            # Re-install deps only if package.json or lock changed
            if ! sudo git diff --quiet "$BEFORE" "$AFTER" -- package.json package-lock.json; then
              echo "package.json or lock changed; running npm ci..."
              sudo npm ci --omit=dev
            else
              echo "No package changes; skipping npm install."
            fi

            sudo pm2 restart "$PM2_APP" --update-env
            sudo pm2 save
          REMOTE

      - name: Verify health endpoint
        env:
          HEALTH_URL: ${{ env.HEALTH_URL }}
        run: |
          echo "Waiting 8s for server to settle..."
          sleep 8
          for attempt in 1 2 3 4 5; do
            CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 10 "$HEALTH_URL" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Health check OK (attempt $attempt)"
              jq '.status, .version' /tmp/health.json || cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $attempt: HTTP $CODE — retrying in 5s..."
            sleep 5
          done
          echo "::error::Health check failed after 5 attempts"
          cat /tmp/health.json || true
          exit 1

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ci-key /tmp/ci-key.pub
