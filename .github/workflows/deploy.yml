name: Deploy to EC2

# Triggers:
#   - automatic on push to main (after CI tests pass — see test.yml)
#   - manual via Actions UI ("Run workflow")
on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: short-lived federated credential, no long-lived AWS keys in GitHub.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_ID: i-0dfec8426e507aa00
  APP_DIR: /home/ec2-user/propvantage-ai-backend
  PM2_APP: propvantage-api
  HEALTH_URL: https://api.prop-vantage.com/api/health

jobs:
  deploy:
    name: SSM deploy to prop-vantage EC2
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prop-vantage-prod
      cancel-in-progress: false

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy

      - name: Send deploy command via SSM
        id: ssm
        run: |
          set -e
          DEPLOY_SCRIPT=$(cat <<'BASH'
          set -euo pipefail
          APP_DIR=/home/ec2-user/propvantage-ai-backend
          PM2_APP=propvantage-api
          cd "$APP_DIR"
          BEFORE=$(git rev-parse --short HEAD)
          echo "Before: $BEFORE"
          git fetch origin main
          git pull origin main --ff-only
          AFTER=$(git rev-parse --short HEAD)
          echo "After:  $AFTER"
          # Re-install deps only if package.json or lock changed
          if ! git diff --quiet "$BEFORE" "$AFTER" -- package.json package-lock.json; then
            echo "package.json or lock changed; running npm ci..."
            npm ci --omit=dev
          else
            echo "No package changes; skipping npm install."
          fi
          pm2 restart "$PM2_APP" --update-env
          pm2 save
          echo "Deployed $AFTER"
          BASH
          )

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "gh-actions deploy ${{ github.sha }}" \
            --timeout-seconds 600 \
            --parameters "commands=[$(jq -Rs . <<<"$DEPLOY_SCRIPT")]" \
            --cloud-watch-output-config "CloudWatchOutputEnabled=false" \
            --query 'Command.CommandId' --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Started SSM command $CMD_ID"

      - name: Wait for SSM command to finish
        run: |
          set -e
          CMD_ID="${{ steps.ssm.outputs.command_id }}"
          # AWS CLI ships a built-in waiter for command execution
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" || true
          # Always fetch the invocation to surface output and final status
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --output json > /tmp/inv.json
          STATUS=$(jq -r .Status /tmp/inv.json)
          echo "=== SSM stdout ==="
          jq -r .StandardOutputContent /tmp/inv.json
          echo ""
          echo "=== SSM stderr ==="
          jq -r .StandardErrorContent /tmp/inv.json
          echo ""
          echo "Final status: $STATUS"
          [ "$STATUS" = "Success" ] || { echo "::error::Deploy command failed"; exit 1; }

      - name: Verify health endpoint
        run: |
          echo "Waiting 8s for server to settle..."
          sleep 8
          for attempt in 1 2 3 4 5; do
            CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 10 "$HEALTH_URL" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Health check OK (attempt $attempt)"
              jq '.status, .version' /tmp/health.json || cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $attempt: HTTP $CODE — retrying in 5s..."
            sleep 5
          done
          echo "::error::Health check failed after 5 attempts"
          cat /tmp/health.json || true
          exit 1
